<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>风起日落 · 君安否</title>
    <style>
        /* ========== 爱情欢喜主题（默认） ========== */
        :root {
            --bg-gradient-start: #fef3e8;
            --bg-gradient-end: #f5e6d3;
            --card-bg: rgba(255, 252, 245, 0.96);
            --text-primary: #4a2c2c;
            --text-secondary: #b46b5a;
            --border-color: #e6d2b5;
            --input-bg: #fffcf7;
            --accent: #c0826b;
            --accent-hover: #a86b54;
            --shadow: 0 12px 28px rgba(0,0,0,0.08);
            --error-bg: #ffe8e0;
            --error-color: #c76e4a;
            --success-color: #9b7a5a;
            --decor-opacity: 0.3;
            --font-family: 'Georgia', 'Times New Roman', '宋体', serif;
        }
        /* 美少女战士主题 */
        body.theme-sailor {
            --bg-gradient-start: #1b0e2e;
            --bg-gradient-end: #331a4d;
            --card-bg: rgba(255, 245, 250, 0.92);
            --text-primary: #2a1a3a;
            --text-secondary: #e85d9e;
            --border-color: #ffb6c1;
            --input-bg: rgba(255, 255, 255, 0.9);
            --accent: #e85d9e;
            --accent-hover: #c93e7a;
            --shadow: 0 12px 28px rgba(0,0,0,0.2);
            --error-bg: #ffe0e6;
            --error-color: #c94f6d;
            --success-color: #b5838a;
            --decor-opacity: 0.4;
            --font-family: 'Georgia', 'Quicksand', 'Segoe UI', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* ========== 背景图片设置 ========== */
        body {
            background-image: url('https://raw.githubusercontent.com/weiguang6/my-images/main/bg.jpg'); /* ⚠️ 请替换为你的图片链接 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            transition: background 0.3s;
        }
        body.theme-sailor {
            background-image: url('https://raw.githubusercontent.com/weiguang6/my-images/refs/heads/main/%E7%BE%8E%E5%B0%91%E5%A5%B3%E6%88%98%E5%A3%AB.jpg'); /* ⚠️ 美少女主题背景，可替换或留空 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* 半透明遮罩（提升文字可读性） */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: brightness(0.92);
            pointer-events: none;
            z-index: 0;
        }
        /* 装饰元素 */
        body::after {
            content: "🌸✨🌸";
            position: fixed;
            top: 12px;
            left: 12px;
            font-size: 28px;
            opacity: var(--decor-opacity);
            pointer-events: none;
            z-index: 0;
        }
        body.theme-sailor::after {
            content: "🌙✨⭐";
        }
        .decor-bottom {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 20px;
            opacity: var(--decor-opacity);
            pointer-events: none;
            z-index: 0;
        }
        body.theme-sailor .decor-bottom {
            content: "🌙✨🎀";
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
            z-index: 2;
            transition: background 0.2s, border-color 0.2s;
            margin: 0 auto;
        }

        .panel {
            padding: 32px 28px;
        }

        .decor {
            text-align: center;
            margin-bottom: 8px;
        }
        .decor-icon {
            font-size: 56px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            animation: gentleFloat 3s ease-in-out infinite;
        }
        @keyframes gentleFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        h2 {
            text-align: center;
            color: var(--text-secondary);
            font-size: clamp(26px, 6vw, 32px);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .sub {
            text-align: center;
            color: #c2779a;
            font-size: 14px;
            margin-bottom: 28px;
            font-style: italic;
            border-bottom: 1px dashed var(--border-color);
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 5px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-bottom: 28px;
        }
        .step-dot {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #f2e0d4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #8b5a4a;
            font-size: 18px;
            transition: all 0.3s;
        }
        body.theme-sailor .step-dot {
            background: #f2cfdf;
            color: #a56b8a;
        }
        .step-dot.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 0 3px rgba(192, 130, 107, 0.3);
        }
        body.theme-sailor .step-dot.active {
            box-shadow: 0 0 0 3px rgba(232, 93, 158, 0.4);
        }
        .step-dot.completed {
            background: var(--success-color);
            color: white;
        }

        .question-card {
            background: var(--input-bg);
            border-radius: 36px;
            padding: 24px;
            margin-bottom: 22px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        .question-text {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .question-text:before {
            content: "📜";
            font-size: 26px;
        }
        body.theme-sailor .question-text:before {
            content: "🎀";
        }

        .answer-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 16px;
            border: 2px solid var(--border-color);
            border-radius: 60px;
            background: rgba(255, 255, 245, 0.95);
            color: var(--text-primary);
            outline: none;
            transition: 0.2s;
        }
        .answer-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(192, 130, 107, 0.2);
        }
        body.theme-sailor .answer-input:focus {
            box-shadow: 0 0 0 3px rgba(232, 93, 158, 0.2);
        }

        .next-btn, .unlock-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 14px;
        }
        .next-btn:hover, .unlock-btn:hover {
            background: var(--accent-hover);
            transform: scale(0.98);
        }

        .error-msg {
            background: var(--error-bg);
            color: var(--error-color);
            padding: 10px;
            border-radius: 40px;
            font-size: 13px;
            text-align: center;
            margin-top: 14px;
        }
        .hidden { display: none; }

        /* 信件区域 */
        .letter-content {
            background: var(--card-bg);
        }
        .letter-header {
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 18px;
            margin-bottom: 22px;
        }
        .letter-header h3 {
            font-size: clamp(22px, 5vw, 28px);
            color: var(--text-secondary);
        }
        .letter-date {
            color: #b88a72;
            font-size: 12px;
            margin-top: 5px;
        }
        body.theme-sailor .letter-date {
            color: #c58aa7;
        }
        .letter-body {
            line-height: 1.75;
            color: var(--text-primary);
            text-align: justify;
            background: var(--input-bg);
            padding: 24px;
            border-radius: 32px;
            border: 1px solid var(--border-color);
            font-size: 15px;
        }
        .letter-select {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 24px 0;
        }
        .letter-select button {
            background: #f2e0d4;
            color: #7a4a3a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        body.theme-sailor .letter-select button {
            background: #f5d6e4;
            color: #8a4a6e;
        }
        .letter-select button.active {
            background: var(--accent);
            color: white;
        }
        .reply-area {
            margin-top: 28px;
            border-top: 2px dotted var(--border-color);
            padding-top: 22px;
        }
        .reply-area h4 {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 16px;
            font-size: 18px;
        }
        .reply-input, .reply-textarea {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            border-radius: 48px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 14px;
        }
        .reply-textarea {
            border-radius: 24px;
            min-height: 90px;
        }
        #sendFeedbackBtn {
            font-size: 18px !important;
            letter-spacing: 2px;
            padding: 12px 20px;
        }
        @media (max-width: 480px) {
            #sendFeedbackBtn {
                font-size: 16px !important;
                padding: 10px 16px;
            }
        }
        .stats {
            text-align: center;
            font-size: 12px;
            margin: 16px 0;
            color: #b88a72;
        }
        body.theme-sailor .stats {
            color: #c58aa7;
        }
        .logout-btn {
            background: #f2e0d4;
            color: #7a4a3a;
            margin-top: 12px;
            width: auto;
            display: inline-block;
            padding: 8px 28px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
        }
        body.theme-sailor .logout-btn {
            background: #f2cfdf;
            color: #7a4a62;
        }
        .flex-center { text-align: center; }
        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--card-bg);
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            box-shadow: var(--shadow);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: 0.2s;
        }
        footer {
            font-size: 11px;
            text-align: center;
            color: #b88a72;
            margin-top: 24px;
            padding-top: 14px;
            border-top: 1px solid var(--border-color);
        }
        body.theme-sailor footer {
            color: #b5839a;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #b88a72;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.3s ease; }

        @media (max-width: 480px) {
            body { padding: 12px; }
            .panel { padding: 20px 16px; }
            .question-card { padding: 18px; }
            .question-text { font-size: 18px; }
            .answer-input { padding: 10px 16px; }
            .step-dot { width: 38px; height: 38px; font-size: 16px; }
            .letter-body { padding: 16px; font-size: 14px; }
        }
        .container, .panel, .letter-content, .question-card { overflow: visible; }
    </style>
</head>
<body>
<div class="decor-bottom" id="decorBottom">🌸✨🌸</div>
<button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌸</button>
<div class="container">
    <div id="questionsPanel" class="panel">
        <div class="decor"><div class="decor-icon" id="decorIcon">❤️📜</div></div>
        <h2>风起日落，君安否？</h2>
        <div class="sub" id="subText">回答两道密语，启封信件，忘记密码凭语音条找我领取！！！</div>
        <div class="step-indicator" id="stepIndicator">
            <div class="step-dot" id="step1Dot">1</div>
            <div class="step-dot" id="step2Dot">2</div>
        </div>
        <div id="question1Box" class="question-card">
            <div class="question-text">第一问：认识的时候，我在哪个城市</div>
            <input type="text" id="answer1" class="answer-input" placeholder="请输入答案" autocomplete="off">
            <button id="nextStepBtn" class="next-btn">✨ 下一步 ✨</button>
            <div id="error1" class="error-msg hidden"></div>
        </div>
        <div id="question2Box" class="question-card hidden">
            <div class="question-text">第二问：_ _ _ _的我爱上香软狗蛋</div>
            <input type="text" id="answer2" class="answer-input" placeholder="请输入答案" autocomplete="off">
            <button id="unlockFinalBtn" class="unlock-btn">🔓 开启信笺 🔓</button>
            <div id="error2" class="error-msg hidden"></div>
        </div>
    </div>
    <div id="contentPanel" class="letter-content hidden">
        <div class="panel">
            <div class="letter-header">
                <h3 id="letterTitle">📜 密信 · 亲启</h3>
                <div class="letter-date" id="letterDate"></div>
            </div>
            <div id="letterBody" class="letter-body fade-in"><div class="loading">🔐 正在加载信件...</div></div>
            <div class="letter-select" id="letterSelect"></div>
            <div class="reply-area">
                <h4>💌 留言 · 给写信人</h4>
                <form id="feedbackForm">
                    <input type="text" name="name" class="reply-input" placeholder=" 昵称" required>
                    <input type="email" name="email" class="reply-input" placeholder="你的邮箱（邮箱的形式就好@.com）" required>
                    <textarea name="message" class="reply-textarea" placeholder="写下你想说的话..." required></textarea>
                    <button type="submit" id="sendFeedbackBtn" style="background:#c0826b;">💬 寄出回音</button>
                    <div id="feedbackStatus" style="margin-top: 12px; font-size: 13px; text-align:center;"></div>
                </form>
            </div>
            <div class="stats" id="visitStats"></div>
            <div class="flex-center"><button id="resetAllBtn" class="logout-btn">🔒 重新验证 / 退出</button></div>
            <footer>🌺 爱意深藏 · 唯你能解 🌺</footer>
        </div>
    </div>
</div>

<script>
    // ========== 防止查看源代码 ==========
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.addEventListener('keydown', (e) => {
        if (e.key === 'F12') { e.preventDefault(); return false; }
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) { e.preventDefault(); return false; }
        if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return false; }
    });

    // ========== 功能逻辑 ==========
    const API_URL = '/api/letter';
    let step1Answer = null;
    let step2Answer = null;
    let currentStep = 1;

    const questionsPanel = document.getElementById('questionsPanel');
    const contentPanel = document.getElementById('contentPanel');
    const question1Box = document.getElementById('question1Box');
    const question2Box = document.getElementById('question2Box');
    const answer1Input = document.getElementById('answer1');
    const answer2Input = document.getElementById('answer2');
    const nextBtn = document.getElementById('nextStepBtn');
    const unlockBtn = document.getElementById('unlockFinalBtn');
    const error1Div = document.getElementById('error1');
    const error2Div = document.getElementById('error2');
    const step1Dot = document.getElementById('step1Dot');
    const step2Dot = document.getElementById('step2Dot');
    const resetAllBtn = document.getElementById('resetAllBtn');
    const themeToggle = document.getElementById('themeToggle');
    const feedbackForm = document.getElementById('feedbackForm');
    const feedbackStatus = document.getElementById('feedbackStatus');
    const letterBody = document.getElementById('letterBody');
    const letterTitle = document.getElementById('letterTitle');
    const letterDateSpan = document.getElementById('letterDate');
    const visitStatsSpan = document.getElementById('visitStats');
    const letterSelectDiv = document.getElementById('letterSelect');
    const decorIcon = document.getElementById('decorIcon');
    const subTextSpan = document.getElementById('subText');
    const decorBottom = document.getElementById('decorBottom');

    let autoLockTimer = null;
    let currentStep1 = null;
    let currentStep2 = null;
    let currentLetterIndex = 0;
    let totalLetters = 0;
    const AUTO_LOCK_MS = 3 * 60 * 1000;

    // 主题切换
    let currentTheme = localStorage.getItem('preferredTheme') || 'love';
    function setTheme(theme) {
        if (theme === 'sailor') {
            document.body.classList.add('theme-sailor');
            themeToggle.textContent = '🌸';
            decorIcon.innerText = '🌙✨🎀';
            subTextSpan.innerText = '回答两道秘语，解锁星月信件';
            decorBottom.innerText = '🌙✨🎀';
            document.querySelector('title').innerText = '月棱镜威力 · 变身解锁';
        } else {
            document.body.classList.remove('theme-sailor');
            themeToggle.textContent = '🌙';
            decorIcon.innerText = '❤️📜';
            subTextSpan.innerText = '回答两道密语，启封心上信件';
            decorBottom.innerText = '🌸✨🌸';
            document.querySelector('title').innerText = '风起日落，君安否？';
        }
        localStorage.setItem('preferredTheme', theme);
        currentTheme = theme;
    }
    function toggleTheme() {
        if (currentTheme === 'love') setTheme('sailor');
        else setTheme('love');
    }
    themeToggle.addEventListener('click', toggleTheme);
    setTheme(currentTheme);

    function showError(element, msg) {
        element.innerHTML = msg;
        element.classList.remove('hidden');
        setTimeout(() => {
            element.classList.add('hidden');
            element.innerHTML = '';
        }, 3000);
    }
    function clearError(element) {
        element.classList.add('hidden');
        element.innerHTML = '';
    }
    function updateStepIndicator() {
        if (currentStep === 1) {
            step1Dot.classList.add('active');
            step2Dot.classList.remove('active', 'completed');
        } else {
            step1Dot.classList.remove('active');
            step1Dot.classList.add('completed');
            step2Dot.classList.add('active');
        }
    }

    function goToStep2() {
        const ans1 = answer1Input.value.trim();
        if (!ans1) {
            showError(error1Div, '请输入第一重密语');
            return;
        }
        step1Answer = ans1;
        question1Box.classList.add('hidden');
        question2Box.classList.remove('hidden');
        currentStep = 2;
        updateStepIndicator();
        answer2Input.focus();
        clearError(error1Div);
    }
    nextBtn.addEventListener('click', goToStep2);

    async function finalUnlock() {
        const ans2 = answer2Input.value.trim();
        if (!ans2) {
            showError(error2Div, '请输入第二重密语');
            return;
        }
        step2Answer = ans2;
        questionsPanel.classList.add('hidden');
        contentPanel.classList.remove('hidden');
        letterBody.innerHTML = '<div class="loading">✨ 验证中，请稍候...</div>';
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ step1: step1Answer, step2: step2Answer, letterIndex: currentLetterIndex })
            });
            const data = await response.json();
            if (response.ok && data.success) {
                letterTitle.innerText = data.title || '📜 密信 · 亲启';
                letterDateSpan.innerText = data.date;
                letterBody.innerHTML = data.content;
                if (data.visits) visitStatsSpan.innerText = `📊 访问次数：${data.visits}`;
                totalLetters = data.totalLetters || 0;
                generateLetterButtons(totalLetters);
                currentStep1 = step1Answer;
                currentStep2 = step2Answer;
                localStorage.setItem('last_letter_index', currentLetterIndex);
                resetAutoLockTimer();
                bindActivity();
            } else {
                questionsPanel.classList.remove('hidden');
                contentPanel.classList.add('hidden');
                showError(error2Div, data.error || '密语错误，无法开启');
                step1Answer = null;
                step2Answer = null;
                answer1Input.value = '';
                answer2Input.value = '';
                question1Box.classList.remove('hidden');
                question2Box.classList.add('hidden');
                currentStep = 1;
                updateStepIndicator();
            }
        } catch (err) {
            questionsPanel.classList.remove('hidden');
            contentPanel.classList.add('hidden');
            showError(error2Div, '网络错误，请稍后重试');
        }
    }
    unlockBtn.addEventListener('click', finalUnlock);

    async function switchLetter(index) {
        if (!currentStep1 || !currentStep2) return;
        if (index >= totalLetters) return;
        currentLetterIndex = index;
        localStorage.setItem('last_letter_index', index);
        document.querySelectorAll('.letter-select button').forEach((btn, i) => {
            if (i == index) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        letterBody.innerHTML = '<div class="loading">📖 读取信件...</div>';
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ step1: currentStep1, step2: currentStep2, letterIndex: index })
            });
            const data = await response.json();
            if (response.ok && data.success) {
                letterTitle.innerText = data.title;
                letterDateSpan.innerText = data.date;
                letterBody.innerHTML = data.content;
            } else {
                letterBody.innerHTML = '<div class="loading" style="color:var(--error-color);">❌ 信件加载失败</div>';
            }
        } catch (err) {
            letterBody.innerHTML = '<div class="loading" style="color:var(--error-color);">🌐 网络错误</div>';
        }
        letterBody.classList.remove('fade-in');
        setTimeout(() => letterBody.classList.add('fade-in'), 10);
    }

    function generateLetterButtons(count) {
        letterSelectDiv.innerHTML = '';
        for (let i = 0; i < count; i++) {
            const btn = document.createElement('button');
            btn.textContent = `💌 第${i+1}封信`;
            btn.dataset.idx = i;
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                switchLetter(idx);
            });
            letterSelectDiv.appendChild(btn);
        }
        const btns = document.querySelectorAll('.letter-select button');
        if (btns[currentLetterIndex]) btns[currentLetterIndex].classList.add('active');
    }

    function resetAutoLockTimer() {
        if (autoLockTimer) clearTimeout(autoLockTimer);
        autoLockTimer = setTimeout(() => {
            fullReset();
            const msg = document.createElement('div');
            msg.className = 'error-msg';
            msg.style.position = 'fixed';
            msg.style.bottom = '20px';
            msg.style.left = '20px';
            msg.style.right = '20px';
            msg.style.zIndex = '1000';
            msg.innerText = '⏰ 长时间无操作，已自动锁定，请重新验证';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }, AUTO_LOCK_MS);
    }
    function bindActivity() {
        const events = ['click', 'mousemove', 'keypress', 'touchstart', 'scroll'];
        events.forEach(ev => {
            document.addEventListener(ev, () => {
                if (!contentPanel.classList.contains('hidden')) resetAutoLockTimer();
            });
        });
    }
    function initVisibilityLock() {
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && !contentPanel.classList.contains('hidden')) {
                fullReset();
                const msg = document.createElement('div');
                msg.className = 'error-msg';
                msg.style.position = 'fixed';
                msg.style.bottom = '20px';
                msg.style.left = '20px';
                msg.style.right = '20px';
                msg.style.zIndex = '1000';
                msg.innerText = '🔒 页面切换或锁屏，已自动锁定';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
            }
        });
    }
    function fullReset() {
        if (autoLockTimer) clearTimeout(autoLockTimer);
        currentStep1 = null; currentStep2 = null; currentLetterIndex = 0;
        step1Answer = null; step2Answer = null;
        answer1Input.value = ''; answer2Input.value = '';
        question1Box.classList.remove('hidden');
        question2Box.classList.add('hidden');
        contentPanel.classList.add('hidden');
        questionsPanel.classList.remove('hidden');
        currentStep = 1;
        updateStepIndicator();
        clearError(error1Div);
        clearError(error2Div);
    }

    if (feedbackForm) {
        feedbackForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('sendFeedbackBtn');
            const originalText = submitBtn.innerText;
            submitBtn.disabled = true;
            feedbackStatus.innerHTML = '📡 发送中...';
            const formData = new FormData(feedbackForm);
            const data = { name: formData.get('name'), email: formData.get('email'), message: formData.get('message') };
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    feedbackStatus.innerHTML = '<span style="color:#9b7a5a;">✅ 回音已寄出！</span>';
                    feedbackForm.reset();
                } else {
                    feedbackStatus.innerHTML = `<span style="color:#c76e4a;">❌ ${result.error || '发送失败'}</span>`;
                }
            } catch (err) {
                feedbackStatus.innerHTML = '<span style="color:#c76e4a;">⚠️ 网络错误，请稍后再试</span>';
            } finally {
                submitBtn.disabled = false;
                setTimeout(() => { feedbackStatus.innerHTML = ''; }, 5000);
            }
        });
    }
    if (resetAllBtn) resetAllBtn.addEventListener('click', fullReset);
    updateStepIndicator();
    initVisibilityLock();
    async function fetchStats() {
        try {
            const res = await fetch('/api/stats');
            const data = await res.json();
            if (data.visits !== undefined) visitStatsSpan.innerText = `📊 访问次数：${data.visits}`;
        } catch(e) {}
    }
    fetchStats();
</script>
</body>
</html>
