<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>双重秘境 · 信启双锁</title>
    <style>
        /* CSS 变量 - 主题色 */
        :root {
            --bg-body: #e8dccc;
            --card-bg: #fffdf7;
            --text-primary: #2e2a24;
            --text-secondary: #7a5a3a;
            --border-light: #f0e2cc;
            --input-bg: white;
            --button-bg: #9b7e5c;
            --button-hover: #7d623e;
            --error-bg: #ffe8df;
            --error-color: #c46b3f;
        }
        body.dark {
            --bg-body: #1a1e2c;
            --card-bg: #2a2e3e;
            --text-primary: #e8e6e1;
            --text-secondary: #c0b8a0;
            --border-light: #3a4050;
            --input-bg: #3a4050;
            --button-bg: #5a6e8a;
            --button-hover: #4a5e7a;
            --error-bg: #4a2e2e;
            --error-color: #e8a080;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s, color 0.2s; }
        body {
            background: var(--bg-body);
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .panel { padding: 36px 32px; }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 16px;
        }
        .step {
            font-size: 14px;
            color: #c7ad85;
            font-weight: 500;
            position: relative;
        }
        .step.active { color: var(--text-secondary); }
        .step.active::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #b68b60;
        }
        .icon { font-size: 56px; text-align: center; margin-bottom: 12px; }
        h2 { text-align: center; color: var(--text-secondary); font-size: 26px; margin-bottom: 8px; }
        .sub { text-align: center; color: #b4926a; font-size: 14px; margin-bottom: 28px; font-style: italic; }
        .input-field {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid var(--border-light);
            border-radius: 60px;
            outline: none;
            background: var(--input-bg);
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        .input-field:focus { border-color: #b68b60; box-shadow: 0 0 0 3px rgba(182, 139, 96, 0.2); }
        button {
            background: var(--button-bg);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: var(--button-hover); transform: scale(0.98); }
        .error-box {
            background: var(--error-bg);
            color: var(--error-color);
            padding: 10px;
            border-radius: 40px;
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
        }
        .hidden { display: none; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #b99e7a;
        }
        .letter-content { background: var(--card-bg); }
        .letter-header {
            text-align: center;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 20px;
            margin-bottom: 24px;
        }
        .letter-header h3 { font-size: 28px; color: var(--text-secondary); margin-bottom: 6px; }
        .letter-body {
            line-height: 1.85;
            color: var(--text-primary);
            text-align: justify;
            min-height: 250px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border-light);
        }
        .reply-area {
            margin-top: 28px;
            border-top: 2px dotted #e6cfaa;
            padding-top: 24px;
        }
        .reply-area h4 { color: var(--text-secondary); margin-bottom: 16px; text-align: center; font-size: 18px; }
        .reply-input, .reply-textarea {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            border-radius: 48px;
            background: var(--input-bg);
            font-family: inherit;
            outline: none;
            color: var(--text-primary);
        }
        .reply-textarea { border-radius: 24px; resize: vertical; min-height: 90px; }
        .logout-btn {
            background: #cfbc9a;
            color: #5e3e22;
            margin-top: 20px;
            width: auto;
            display: inline-block;
            padding: 10px 28px;
        }
        .flex-center { text-align: center; }
        footer {
            font-size: 11px;
            text-align: center;
            color: #b5936e;
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
        }
        .hint-text { font-size: 12px; color: #b99e7a; text-align: center; margin-top: 18px; }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: none;
            font-size: 24px;
            cursor: pointer;
            width: auto;
            border-radius: 50%;
            padding: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 1000;
        }
        .letter-select {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .letter-select button {
            width: auto;
            padding: 8px 16px;
            background: #cfbc9a;
            color: #5e3e22;
        }
        .letter-select button.active {
            background: #9b7e5c;
            color: white;
        }
        .stats {
            text-align: center;
            font-size: 12px;
            margin-top: 8px;
            color: #b99e7a;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
<button class="theme-toggle" id="themeToggle">🌙</button>
<div class="container">
    <!-- 第一重验证 -->
    <div id="step1Panel" class="panel">
        <div class="step-indicator">
            <span class="step active">第一重 · 钥石</span>
            <span class="step">第二重 · 密契</span>
        </div>
        <div class="icon">🔒✋</div>
        <h2>封缄之地</h2>
        <div class="sub">请通过第一道验证</div>
        <input type="text" id="step1Input" class="input-field" placeholder="第一重密令" autocomplete="off">
        <button id="step1Btn">➤ 验证第一道锁</button>
        <div id="step1Error" class="error-box hidden"></div>
        <div class="hint-text">⚡ 只有持有正确密令的人才能继续</div>
    </div>

    <!-- 第二重验证 -->
    <div id="step2Panel" class="panel hidden">
        <div class="step-indicator">
            <span class="step">第一重 · 钥石</span>
            <span class="step active">第二重 · 密契</span>
        </div>
        <div class="icon">🔐🗝️</div>
        <h2>第二道秘境</h2>
        <div class="sub">再输入另一组密语</div>
        <input type="text" id="step2Input" class="input-field" placeholder="第二重密令" autocomplete="off">
        <button id="step2Btn">➤ 验证第二道锁</button>
        <div id="step2Error" class="error-box hidden"></div>
        <div class="hint-text">🔑 双重守护，双重信任</div>
    </div>

    <!-- 信件内容 -->
    <div id="contentPanel" class="letter-content hidden">
        <div class="panel">
            <div class="letter-header">
                <h3 id="letterTitle">📜 密信 · 亲启</h3>
                <div class="letter-date" id="letterDate"></div>
            </div>
            <div id="letterBody" class="letter-body fade-in">
                <div class="loading">🔐 正在加载信件...</div>
            </div>

            <!-- 多封信件切换 -->
            <div class="letter-select" id="letterSelect">
                <button data-idx="0">第一封信</button>
                <button data-idx="1">第二封信</button>
                <button data-idx="2">第三封信</button>
            </div>

            <!-- 留言区 -->
            <div class="reply-area">
                <h4>📬 回音壁 · 给守秘人留言</h4>
                <form id="feedbackForm">
                    <input type="text" name="name" class="reply-input" placeholder="你的名字 / 昵称" required>
                    <input type="email" name="email" class="reply-input" placeholder="你的邮箱（以便回信）" required>
                    <textarea name="message" class="reply-textarea" placeholder="请写下你想说的话..." required></textarea>
                    <button type="submit" id="sendFeedbackBtn" style="background:#b48c54;">💌 寄出回音</button>
                    <div id="feedbackStatus" style="margin-top: 12px; font-size: 13px; text-align:center;"></div>
                </form>
                <div class="hint-text">回音将会直接送达守秘人（开发者）</div>
            </div>

            <div class="stats" id="visitStats"></div>
            <div class="flex-center">
                <button id="resetAllBtn" class="logout-btn">🔒 彻底退出 / 重新验证</button>
            </div>
            <footer>双重验证保护 · 关闭页面后需重新输入全部密码</footer>
        </div>
    </div>
</div>

<script>
    // 配置
    const STEP1_SECRETS = ["启明星", "OpenSesame", "芝兰"];
    const STEP2_SECRETS = ["月光码头", "2026@Gate", "玉树"];
    const API_URL = '/api/letter';
    
    // DOM 元素
    const step1Panel = document.getElementById('step1Panel');
    const step2Panel = document.getElementById('step2Panel');
    const contentPanel = document.getElementById('contentPanel');
    const step1Input = document.getElementById('step1Input');
    const step2Input = document.getElementById('step2Input');
    const step1Btn = document.getElementById('step1Btn');
    const step2Btn = document.getElementById('step2Btn');
    const step1Error = document.getElementById('step1Error');
    const step2Error = document.getElementById('step2Error');
    const resetAllBtn = document.getElementById('resetAllBtn');
    const letterBody = document.getElementById('letterBody');
    const letterDateSpan = document.getElementById('letterDate');
    const letterTitle = document.getElementById('letterTitle');
    const feedbackForm = document.getElementById('feedbackForm');
    const feedbackStatus = document.getElementById('feedbackStatus');
    const visitStatsSpan = document.getElementById('visitStats');
    const themeToggle = document.getElementById('themeToggle');
    
    // 全局变量
    let autoLockTimer = null;
    let currentStep1 = null;
    let currentStep2 = null;
    let currentLetterIndex = 0;
    
    const AUTO_LOCK_MS = 3 * 60 * 1000;
    
    // 主题切换
    function initTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            themeToggle.textContent = '☀️';
        } else {
            document.body.classList.remove('dark');
            themeToggle.textContent = '🌙';
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            themeToggle.textContent = '🌙';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            themeToggle.textContent = '☀️';
        }
    }
    themeToggle.addEventListener('click', toggleTheme);
    initTheme();
    
    function showError(element, message, remainingAttempts = null) {
        let msg = message;
        if (remainingAttempts !== null && remainingAttempts > 0) {
            msg += `（还剩 ${remainingAttempts} 次尝试机会）`;
        }
        element.innerHTML = msg;
        element.classList.remove('hidden');
        setTimeout(() => {
            element.classList.add('hidden');
            element.innerHTML = '';
        }, 3000);
    }
    function clearError(element) {
        element.classList.add('hidden');
        element.innerHTML = '';
    }
    
    function resetAutoLockTimer() {
        if (autoLockTimer) clearTimeout(autoLockTimer);
        autoLockTimer = setTimeout(() => {
            fullReset();
            const msg = document.createElement('div');
            msg.className = 'error-box';
            msg.style.position = 'fixed';
            msg.style.bottom = '20px';
            msg.style.left = '20px';
            msg.style.right = '20px';
            msg.style.zIndex = '1000';
            msg.innerText = '⏰ 由于长时间无操作，已自动锁定，请重新输入密码';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }, AUTO_LOCK_MS);
    }
    
    function bindActivity() {
        const events = ['click', 'mousemove', 'keypress', 'touchstart', 'scroll'];
        events.forEach(ev => {
            document.addEventListener(ev, () => {
                if (!contentPanel.classList.contains('hidden')) {
                    resetAutoLockTimer();
                }
            });
        });
    }
    
    // 手机锁屏自动锁定
    function initVisibilityLock() {
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && !contentPanel.classList.contains('hidden')) {
                fullReset();
                const msg = document.createElement('div');
                msg.className = 'error-box';
                msg.style.position = 'fixed';
                msg.style.bottom = '20px';
                msg.style.left = '20px';
                msg.style.right = '20px';
                msg.style.zIndex = '1000';
                msg.innerText = '🔒 由于页面切换或锁屏，已自动锁定，请重新输入密码';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
            }
        });
    }
    
    async function loadLetter(step1, step2, letterIndex) {
        letterBody.innerHTML = '<div class="loading">📡 正在从秘境加载信件...</div>';
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ step1, step2, letterIndex })
            });
            const data = await response.json();
            if (response.ok && data.success) {
                letterTitle.innerText = data.title || '📜 密信 · 亲启';
                letterDateSpan.innerText = data.date;
                letterBody.innerHTML = data.content;
                if (data.visits) visitStatsSpan.innerText = `📊 访问次数：${data.visits}`;
                return true;
            } else {
                letterBody.innerHTML = `<div class="loading" style="color:var(--error-color);">❌ ${data.error}<br>请返回重新验证</div>`;
                return false;
            }
        } catch (err) {
            letterBody.innerHTML = '<div class="loading" style="color:var(--error-color);">❌ 网络错误，请稍后重试</div>';
            return false;
        }
    }
    
    async function switchLetter(index) {
        if (!currentStep1 || !currentStep2) return;
        currentLetterIndex = index;
        document.querySelectorAll('.letter-select button').forEach((btn, i) => {
            if (i == index) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        await loadLetter(currentStep1, currentStep2, index);
        letterBody.classList.remove('fade-in');
        setTimeout(() => letterBody.classList.add('fade-in'), 10);
    }
    
    function verifyStep1() {
        const inputVal = step1Input.value.trim();
        if (!inputVal) {
            showError(step1Error, '❌ 请输入第一重密令');
            step1Input.focus();
            return;
        }
        if (STEP1_SECRETS.includes(inputVal)) {
            currentStep1 = inputVal;
            step1Panel.classList.add('hidden');
            step2Panel.classList.remove('hidden');
            step1Input.value = '';
            clearError(step1Error);
            step2Input.focus();
        } else {
            showError(step1Error, '❌ 密令错误');
            step1Input.value = '';
            step1Input.focus();
        }
    }
    
    async function verifyStep2() {
        const inputVal = step2Input.value.trim();
        if (!inputVal) {
            showError(step2Error, '❌ 请输入第二重密令');
            step2Input.focus();
            return;
        }
        if (!currentStep1) {
            showError(step2Error, '❌ 会话已过期，请重新开始');
            fullReset();
            return;
        }
        if (STEP2_SECRETS.includes(inputVal)) {
            currentStep2 = inputVal;
            step2Panel.classList.add('hidden');
            contentPanel.classList.remove('hidden');
            step2Input.value = '';
            clearError(step2Error);
            const success = await loadLetter(currentStep1, currentStep2, currentLetterIndex);
            if (success) {
                document.querySelectorAll('.letter-select button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = parseInt(e.target.dataset.idx);
                        switchLetter(idx);
                    });
                });
                const defaultBtn = document.querySelector('.letter-select button[data-idx="0"]');
                if (defaultBtn) defaultBtn.classList.add('active');
                resetAutoLockTimer();
                bindActivity();
            } else {
                step2Panel.classList.remove('hidden');
                contentPanel.classList.add('hidden');
            }
        } else {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ step1: currentStep1, step2: inputVal })
                });
                const data = await res.json();
                if (data.remainingAttempts !== undefined) {
                    showError(step2Error, `❌ 密令错误`, data.remainingAttempts);
                } else if (data.locked) {
                    showError(step2Error, `❌ ${data.error}`);
                } else {
                    showError(step2Error, '❌ 密令错误');
                }
            } catch(e) {
                showError(step2Error, '❌ 密令错误');
            }
            step2Input.value = '';
            step2Input.focus();
        }
    }
    
    function fullReset() {
        if (autoLockTimer) clearTimeout(autoLockTimer);
        sessionStorage.removeItem('double_gate_session');
        currentStep1 = null;
        currentStep2 = null;
        currentLetterIndex = 0;
        step1Panel.classList.remove('hidden');
        step2Panel.classList.add('hidden');
        contentPanel.classList.add('hidden');
        step1Input.value = '';
        step2Input.value = '';
        clearError(step1Error);
        clearError(step2Error);
        step1Input.focus();
    }
    
    async function checkExistingSession() {
        fullReset();
    }
    
    if (feedbackForm) {
        feedbackForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('sendFeedbackBtn');
            const originalText = submitBtn.innerText;
            submitBtn.disabled = true;
            feedbackStatus.innerHTML = '📡 发送中...';
            const formData = new FormData(feedbackForm);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                message: formData.get('message')
            };
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    feedbackStatus.innerHTML = '<span style="color:#4a7342;">✅ 回音已寄出！</span>';
                    feedbackForm.reset();
                } else {
                    feedbackStatus.innerHTML = `<span style="color:#bc6f42;">❌ ${result.error || '发送失败'}</span>`;
                }
            } catch (err) {
                feedbackStatus.innerHTML = '<span style="color:#bc6f42;">⚠️ 网络错误，请稍后再试</span>';
            } finally {
                submitBtn.disabled = false;
                setTimeout(() => { feedbackStatus.innerHTML = ''; }, 5000);
            }
        });
    }
    
    step1Btn.addEventListener('click', verifyStep1);
    step2Btn.addEventListener('click', verifyStep2);
    if (resetAllBtn) resetAllBtn.addEventListener('click', fullReset);
    step1Input.addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyStep1(); });
    step2Input.addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyStep2(); });
    
    checkExistingSession();
    initVisibilityLock();
    
    async function fetchStats() {
        try {
            const res = await fetch('/api/stats');
            const data = await res.json();
            if (data.visits !== undefined) visitStatsSpan.innerText = `📊 访问次数：${data.visits}`;
        } catch(e) {}
    }
    fetchStats();
</script>
</body>
</html>
