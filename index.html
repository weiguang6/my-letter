<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>月棱镜威力 · 变身解锁</title>
    <style>
        /* ========== 美少女战士主题变量 ========== */
        :root {
            --bg-gradient-start: #0a0f2a;
            --bg-gradient-end: #2a1a3a;
            --card-bg: rgba(255, 245, 250, 0.92);
            --text-primary: #2a1a3a;
            --text-secondary: #b43b6e;
            --border-color: #ffb6c1;
            --input-bg: rgba(255, 255, 255, 0.9);
            --accent: #e85d9e;
            --accent-hover: #c93e7a;
            --shadow: 0 20px 35px -8px rgba(0,0,0,0.3);
            --error-bg: #ffe0e6;
            --error-color: #c94f6d;
            --success-color: #b5838a;
            --moon-glow: 0 0 12px #ffb7c5;
        }
        body.dark {
            --bg-gradient-start: #0e0b1c;
            --bg-gradient-end: #1e102e;
            --card-bg: rgba(30, 20, 40, 0.92);
            --text-primary: #f4e9ff;
            --text-secondary: #ffb3d1;
            --border-color: #5a3a6a;
            --input-bg: #2a1a3a;
            --accent: #d96c9e;
            --accent-hover: #c04e7a;
            --moon-glow: 0 0 12px #ff98b9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 30%, var(--bg-gradient-start), var(--bg-gradient-end));
            background-attachment: fixed;
            font-family: 'Georgia', 'Quicksand', 'Segoe UI', system-ui, serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            transition: background 0.2s;
        }

        /* 美少女战士装饰：星星、月亮、蝴蝶结 */
        body::before {
            content: "🌙⭐💖";
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 32px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: "✨🎀✨";
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 36px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 680px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            box-shadow: var(--shadow), 0 0 0 2px rgba(255, 200, 220, 0.5);
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            position: relative;
            z-index: 2;
        }

        .panel {
            padding: 40px 36px;
        }

        /* 装饰icon */
        .decor {
            text-align: center;
            margin-bottom: 12px;
        }
        .decor-icon {
            font-size: 70px;
            filter: drop-shadow(var(--moon-glow));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        h2 {
            text-align: center;
            color: var(--text-secondary);
            font-size: 28px;
            margin-bottom: 6px;
            letter-spacing: 2px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .sub {
            text-align: center;
            color: #c2779a;
            font-size: 14px;
            margin-bottom: 32px;
            font-style: italic;
            border-bottom: 1px dashed var(--border-color);
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 6px;
        }

        /* 问答卡片 */
        .question-card {
            background: var(--input-bg);
            border-radius: 40px;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .question-text {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .question-text:before {
            content: "🎀";
            font-size: 28px;
            font-weight: normal;
        }

        .answer-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid var(--border-color);
            border-radius: 60px;
            background: rgba(255,255,245,0.9);
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
        }
        .answer-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232, 93, 158, 0.3);
        }

        .next-btn, .unlock-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .next-btn:hover, .unlock-btn:hover {
            background: var(--accent-hover);
            transform: scale(0.98);
        }

        .error-msg {
            background: var(--error-bg);
            color: var(--error-color);
            padding: 12px;
            border-radius: 40px;
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        .step-dot {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f2cfdf;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #a56b8a;
            font-size: 18px;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .step-dot.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 0 4px rgba(232, 93, 158, 0.4);
        }
        .step-dot.completed {
            background: var(--success-color);
            color: white;
        }

        .hidden {
            display: none;
        }

        /* 信件区域 */
        .letter-content {
            background: var(--card-bg);
        }
        .letter-header {
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 24px;
        }
        .letter-header h3 {
            font-size: 28px;
            color: var(--text-secondary);
        }
        .letter-date {
            color: #c58aa7;
            font-size: 12px;
            margin-top: 6px;
        }
        .letter-body {
            line-height: 1.85;
            color: var(--text-primary);
            text-align: justify;
            background: var(--input-bg);
            padding: 28px;
            border-radius: 32px;
            border: 1px solid var(--border-color);
        }
        .letter-select {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 24px 0;
            flex-wrap: wrap;
        }
        .letter-select button {
            background: #f5d6e4;
            color: #8a4a6e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .letter-select button.active {
            background: var(--accent);
            color: white;
        }
        .reply-area {
            margin-top: 32px;
            border-top: 2px dotted var(--border-color);
            padding-top: 24px;
        }
        .reply-area h4 {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 16px;
        }
        .reply-input, .reply-textarea {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            border-radius: 48px;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .reply-textarea {
            border-radius: 24px;
            min-height: 90px;
        }
        .stats {
            text-align: center;
            font-size: 12px;
            margin: 16px 0;
            color: #c58aa7;
        }
        .logout-btn {
            background: #f2cfdf;
            color: #7a4a62;
            margin-top: 16px;
            width: auto;
            display: inline-block;
            padding: 8px 28px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }
        .flex-center {
            text-align: center;
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: none;
            font-size: 26px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            box-shadow: var(--shadow);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 100;
        }
        footer {
            font-size: 11px;
            text-align: center;
            color: #b5839a;
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.4s ease;
        }
        /* 额外的小星星 */
        .star {
            position: fixed;
            color: #ffdf80;
            font-size: 16px;
            pointer-events: none;
            z-index: 1;
            animation: twinkle 4s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; text-shadow: 0 0 2px gold; }
            50% { opacity: 1; text-shadow: 0 0 8px yellow; }
        }
    </style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>
<div class="container">
    <!-- 分步问答面板 -->
    <div id="questionsPanel" class="panel">
        <div class="decor">
            <div class="decor-icon">🌙✨🎀</div>
        </div>
        <h2>月棱镜威力 · 变身</h2>
        <div class="sub">回答两道秘语，解锁星月信件</div>

        <div class="step-indicator" id="stepIndicator">
            <div class="step-dot" id="step1Dot">1</div>
            <div class="step-dot" id="step2Dot">2</div>
        </div>

        <div id="question1Box" class="question-card">
            <div class="question-text">第一道 · 星之密语</div>
            <input type="text" id="answer1" class="answer-input" placeholder="请输入答案" autocomplete="off">
            <button id="nextStepBtn" class="next-btn">✨ 下一关 ✨</button>
            <div id="error1" class="error-msg hidden"></div>
        </div>

        <div id="question2Box" class="question-card hidden">
            <div class="question-text">第二道 · 月之密语</div>
            <input type="text" id="answer2" class="answer-input" placeholder="请输入答案" autocomplete="off">
            <button id="unlockFinalBtn" class="unlock-btn">🔓 月棱镜威力 变身解锁 🔓</button>
            <div id="error2" class="error-msg hidden"></div>
        </div>
    </div>

    <!-- 信件内容面板 -->
    <div id="contentPanel" class="letter-content hidden">
        <div class="panel">
            <div class="letter-header">
                <h3 id="letterTitle">📜 星月信笺 · 亲启</h3>
                <div class="letter-date" id="letterDate"></div>
            </div>
            <div id="letterBody" class="letter-body fade-in">
                <div class="loading">🌟 正在从银河加载信件...</div>
            </div>
            <div class="letter-select" id="letterSelect"></div>
            <div class="reply-area">
                <h4>💌 回音壁 · 给月野兔的留言</h4>
                <form id="feedbackForm">
                    <input type="text" name="name" class="reply-input" placeholder="你的名字 / 昵称" required>
                    <input type="email" name="email" class="reply-input" placeholder="你的邮箱（以便回信）" required>
                    <textarea name="message" class="reply-textarea" placeholder="写下你想对月亮说的话..." required></textarea>
                    <button type="submit" id="sendFeedbackBtn" style="background:#e85d9e;">🌙 寄出回音 🌙</button>
                    <div id="feedbackStatus" style="margin-top: 12px; font-size: 13px; text-align:center;"></div>
                </form>
            </div>
            <div class="stats" id="visitStats"></div>
            <div class="flex-center">
                <button id="resetAllBtn" class="logout-btn">🔒 重新变身 / 退出</button>
            </div>
            <footer>🌙 美少女战士 · 星月守护 🌙</footer>
        </div>
    </div>
</div>

<script>
    // ========== 配置 ==========
    const API_URL = '/api/letter';
    let step1Answer = null;
    let step2Answer = null;
    let currentStep = 1;

    // DOM 元素
    const questionsPanel = document.getElementById('questionsPanel');
    const contentPanel = document.getElementById('contentPanel');
    const question1Box = document.getElementById('question1Box');
    const question2Box = document.getElementById('question2Box');
    const answer1Input = document.getElementById('answer1');
    const answer2Input = document.getElementById('answer2');
    const nextBtn = document.getElementById('nextStepBtn');
    const unlockBtn = document.getElementById('unlockFinalBtn');
    const error1Div = document.getElementById('error1');
    const error2Div = document.getElementById('error2');
    const step1Dot = document.getElementById('step1Dot');
    const step2Dot = document.getElementById('step2Dot');
    const resetAllBtn = document.getElementById('resetAllBtn');
    const themeToggle = document.getElementById('themeToggle');
    const feedbackForm = document.getElementById('feedbackForm');
    const feedbackStatus = document.getElementById('feedbackStatus');
    const letterBody = document.getElementById('letterBody');
    const letterTitle = document.getElementById('letterTitle');
    const letterDateSpan = document.getElementById('letterDate');
    const visitStatsSpan = document.getElementById('visitStats');
    const letterSelectDiv = document.getElementById('letterSelect');

    // 全局变量
    let autoLockTimer = null;
    let currentStep1 = null;
    let currentStep2 = null;
    let currentLetterIndex = 0;
    let totalLetters = 0;
    const AUTO_LOCK_MS = 3 * 60 * 1000;

    // 主题切换
    function initTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            themeToggle.textContent = '☀️';
        } else {
            document.body.classList.remove('dark');
            themeToggle.textContent = '🌙';
        }
    }
    function toggleTheme() {
        if (document.body.classList.contains('dark')) {
            document.body.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            themeToggle.textContent = '🌙';
        } else {
            document.body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            themeToggle.textContent = '☀️';
        }
    }
    themeToggle.addEventListener('click', toggleTheme);
    initTheme();

    // 辅助函数
    function showError(element, msg) {
        element.innerHTML = msg;
        element.classList.remove('hidden');
        setTimeout(() => {
            element.classList.add('hidden');
            element.innerHTML = '';
        }, 3000);
    }
    function clearError(element) {
        element.classList.add('hidden');
        element.innerHTML = '';
    }
    function updateStepIndicator() {
        if (currentStep === 1) {
            step1Dot.classList.add('active');
            step2Dot.classList.remove('active', 'completed');
        } else {
            step1Dot.classList.remove('active');
            step1Dot.classList.add('completed');
            step2Dot.classList.add('active');
        }
    }

    // 第一步 -> 收集答案，进入第二步（不提前验证，密码全部后端校验）
    function goToStep2() {
        const ans1 = answer1Input.value.trim();
        if (!ans1) {
            showError(error1Div, '请输入第一道密语');
            return;
        }
        step1Answer = ans1;
        question1Box.classList.add('hidden');
        question2Box.classList.remove('hidden');
        currentStep = 2;
        updateStepIndicator();
        answer2Input.focus();
        clearError(error1Div);
    }

    nextBtn.addEventListener('click', goToStep2);

    // 最终解锁：将两个答案一起发送给后端
    async function finalUnlock() {
        const ans2 = answer2Input.value.trim();
        if (!ans2) {
            showError(error2Div, '请输入第二道密语');
            return;
        }
        step2Answer = ans2;
        questionsPanel.classList.add('hidden');
        contentPanel.classList.remove('hidden');
        letterBody.innerHTML = '<div class="loading">🌙 星月之力，验证中...</div>';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ step1: step1Answer, step2: step2Answer, letterIndex: currentLetterIndex })
            });
            const data = await response.json();
            if (response.ok && data.success) {
                letterTitle.innerText = data.title || '📜 星月信笺';
                letterDateSpan.innerText = data.date;
                letterBody.innerHTML = data.content;
                if (data.visits) visitStatsSpan.innerText = `📊 访问次数：${data.visits}`;
                totalLetters = data.totalLetters || 0;
                generateLetterButtons(totalLetters);
                currentStep1 = step1Answer;
                currentStep2 = step2Answer;
                localStorage.setItem('last_letter_index', currentLetterIndex);
                resetAutoLockTimer();
                bindActivity();
            } else {
                questionsPanel.classList.remove('hidden');
                contentPanel.classList.add('hidden');
                showError(error2Div, data.error || '密语错误，无法变身');
                step1Answer = null;
                step2Answer = null;
                answer1Input.value = '';
                answer2Input.value = '';
                question1Box.classList.remove('hidden');
                question2Box.classList.add('hidden');
                currentStep = 1;
                updateStepIndicator();
            }
        } catch (err) {
            questionsPanel.classList.remove('hidden');
            contentPanel.classList.add('hidden');
            showError(error2Div, '网络错误，请稍后再试');
        }
    }

    unlockBtn.addEventListener('click', finalUnlock);

    // 信件切换功能
    async function switchLetter(index) {
        if (!currentStep1 || !currentStep2) return;
        if (index >= totalLetters) return;
        currentLetterIndex = index;
        localStorage.setItem('last_letter_index', index);
        document.querySelectorAll('.letter-select button').forEach((btn, i) => {
            if (i == index) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        letterBody.innerHTML = '<div class="loading">🌙 读取信件...</div>';
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ step1: currentStep1, step2: currentStep2, letterIndex: index })
            });
            const data = await response.json();
            if (response.ok && data.success) {
                letterTitle.innerText = data.title;
                letterDateSpan.innerText = data.date;
                letterBody.innerHTML = data.content;
            } else {
                letterBody.innerHTML = '<div class="loading" style="color:var(--error-color);">✨ 信件加载失败 ✨</div>';
            }
        } catch (err) {
            letterBody.innerHTML = '<div class="loading" style="color:var(--error-color);">⭐ 网络错误 ⭐</div>';
        }
        letterBody.classList.remove('fade-in');
        setTimeout(() => letterBody.classList.add('fade-in'), 10);
    }

    function generateLetterButtons(count) {
        letterSelectDiv.innerHTML = '';
        for (let i = 0; i < count; i++) {
            const btn = document.createElement('button');
            btn.textContent = `💌 第${i+1}封信`;
            btn.dataset.idx = i;
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                switchLetter(idx);
            });
            letterSelectDiv.appendChild(btn);
        }
        const btns = document.querySelectorAll('.letter-select button');
        if (btns[currentLetterIndex]) btns[currentLetterIndex].classList.add('active');
    }

    // 自动锁定
    function resetAutoLockTimer() {
        if (autoLockTimer) clearTimeout(autoLockTimer);
        autoLockTimer = setTimeout(() => {
            fullReset();
            const msg = document.createElement('div');
            msg.className = 'error-msg';
            msg.style.position = 'fixed';
            msg.style.bottom = '20px';
            msg.style.left = '20px';
            msg.style.right = '20px';
            msg.style.zIndex = '1000';
            msg.innerText = '⏰ 长时间未操作，已自动退出变身状态';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }, AUTO_LOCK_MS);
    }

    function bindActivity() {
        const events = ['click', 'mousemove', 'keypress', 'touchstart', 'scroll'];
        events.forEach(ev => {
            document.addEventListener(ev, () => {
                if (!contentPanel.classList.contains('hidden')) {
                    resetAutoLockTimer();
                }
            });
        });
    }

    function initVisibilityLock() {
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && !contentPanel.classList.contains('hidden')) {
                fullReset();
                const msg = document.createElement('div');
                msg.className = 'error-msg';
                msg.style.position = 'fixed';
                msg.style.bottom = '20px';
                msg.style.left = '20px';
                msg.style.right = '20px';
                msg.style.zIndex = '1000';
                msg.innerText = '🔒 页面切换或锁屏，已自动锁定';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
            }
        });
    }

    function fullReset() {
        if (autoLockTimer) clearTimeout(autoLockTimer);
        currentStep1 = null;
        currentStep2 = null;
        currentLetterIndex = 0;
        step1Answer = null;
        step2Answer = null;
        answer1Input.value = '';
        answer2Input.value = '';
        question1Box.classList.remove('hidden');
        question2Box.classList.add('hidden');
        contentPanel.classList.add('hidden');
        questionsPanel.classList.remove('hidden');
        currentStep = 1;
        updateStepIndicator();
        clearError(error1Div);
        clearError(error2Div);
    }

    // 留言
    if (feedbackForm) {
        feedbackForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('sendFeedbackBtn');
            const originalText = submitBtn.innerText;
            submitBtn.disabled = true;
            feedbackStatus.innerHTML = '🌙 发送中...';
            const formData = new FormData(feedbackForm);
            const data = {
                name: formData.get('name'),
                email: formData.get('email'),
                message: formData.get('message')
            };
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    feedbackStatus.innerHTML = '<span style="color:#b5838a;">✅ 回音已寄往月亮！</span>';
                    feedbackForm.reset();
                } else {
                    feedbackStatus.innerHTML = `<span style="color:#c94f6d;">❌ ${result.error || '发送失败'}</span>`;
                }
            } catch (err) {
                feedbackStatus.innerHTML = '<span style="color:#c94f6d;">⚠️ 星月网络不稳定，请稍后重试</span>';
            } finally {
                submitBtn.disabled = false;
                setTimeout(() => { feedbackStatus.innerHTML = ''; }, 5000);
            }
        });
    }

    if (resetAllBtn) resetAllBtn.addEventListener('click', fullReset);
    updateStepIndicator();
    initVisibilityLock();

    async function fetchStats() {
        try {
            const res = await fetch('/api/stats');
            const data = await res.json();
            if (data.visits !== undefined) visitStatsSpan.innerText = `📊 访问次数：${data.visits}`;
        } catch(e) {}
    }
    fetchStats();
</script>
</body>
</html>
